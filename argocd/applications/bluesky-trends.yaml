apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bluesky-trends-pipeline
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/dedyoc/bluesky-trends.git
    targetRevision: main
    path: k8s-manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: data-streaming
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true