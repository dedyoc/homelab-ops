apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: infrastructure-modules
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/homelab-org/homelab-ops.git 
        revision: main
        directories:
          - path: infrastructure/*
  template:
    metadata:
      name: 'infra-{{path.basename}}'
    spec:
      project: default
      source:
        repoURL: https://github.com/homelab-org/homelab-ops.git
        targetRevision: main
        path: '{{path}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{path.basename}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true